<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-label="Three-body FC3 response in a graphene honeycomb lattice">
  <defs>
    <style>
      .bg{fill:#f7f9fc}.panel{fill:#fff;stroke:#d2d8e2;stroke-width:3}.bond{stroke:#8a94a3;stroke-width:4;stroke-linecap:round}.atom{fill:#1f2933;stroke:#fff;stroke-width:5}.u1{fill:#0b63ce;stroke:#fff;stroke-width:5}.u2{fill:#00a676;stroke:#fff;stroke-width:5}.target{fill:#d62828;stroke:#fff;stroke-width:5}.tri{fill:none;stroke:#ff9f1c;stroke-width:10;stroke-linejoin:round}.disp1{stroke:#0b63ce;stroke-width:11;stroke-linecap:round;marker-end:url(#arrowBlue)}.disp2{stroke:#00a676;stroke-width:11;stroke-linecap:round;marker-end:url(#arrowGreen)}.forceOld{stroke:#d62828;stroke-width:8;stroke-linecap:round;opacity:.36;marker-end:url(#arrowRed)}.forceNew{stroke:#d62828;stroke-width:14;stroke-linecap:round;marker-end:url(#arrowRed)}.labelBox{fill:#fff;stroke:#d2d8e2;stroke-width:2;rx:8}.title{font:700 34px Arial,sans-serif;fill:#111827}.note{font:24px Arial,sans-serif;fill:#374151}.small{font:21px Arial,sans-serif;fill:#4b5563}.tag{font:700 24px Arial,sans-serif;fill:#111827}
    </style>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#0b63ce"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#00a676"/></marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#d62828"/></marker>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <rect class="panel" x="60" y="56" width="1080" height="648" rx="18"/>
  <text class="title" x="100" y="120">Three-body anharmonic response</text>
  <text class="note" x="100" y="160">A second displacement modifies the force response produced by the first displacement.</text>

  <g transform="translate(220 235)">
    <g class="bond">
      <line x1="0" y1="120" x2="104" y2="60"/><line x1="104" y1="60" x2="208" y2="120"/><line x1="208" y1="120" x2="208" y2="240"/><line x1="208" y1="240" x2="104" y2="300"/><line x1="104" y1="300" x2="0" y2="240"/><line x1="0" y1="240" x2="0" y2="120"/>
      <line x1="208" y1="120" x2="312" y2="60"/><line x1="312" y1="60" x2="416" y2="120"/><line x1="416" y1="120" x2="416" y2="240"/><line x1="416" y1="240" x2="312" y2="300"/><line x1="312" y1="300" x2="208" y2="240"/>
      <line x1="416" y1="120" x2="520" y2="60"/><line x1="520" y1="60" x2="624" y2="120"/><line x1="624" y1="120" x2="624" y2="240"/><line x1="624" y1="240" x2="520" y2="300"/><line x1="520" y1="300" x2="416" y2="240"/>
    </g>
    <polygon class="tri" points="312,36 208,240 520,326"/>
    <circle class="atom" cx="0" cy="120" r="27"/><circle class="atom" cx="104" cy="60" r="27"/><circle class="atom" cx="208" cy="120" r="27"/><circle class="target" cx="208" cy="240" r="30"/><circle class="atom" cx="104" cy="300" r="27"/><circle class="atom" cx="0" cy="240" r="27"/>
    <circle class="u1" cx="312" cy="36" r="31"/><circle class="atom" cx="416" cy="120" r="27"/><circle class="atom" cx="416" cy="240" r="27"/><circle class="atom" cx="312" cy="300" r="27"/>
    <circle class="atom" cx="520" cy="60" r="27"/><circle class="atom" cx="624" cy="120" r="27"/><circle class="atom" cx="624" cy="240" r="27"/><circle class="u2" cx="520" cy="326" r="31"/>
    <line class="disp1" x1="312" y1="88" x2="312" y2="28"/>
    <line class="disp2" x1="520" y1="300" x2="520" y2="348"/>
    <line class="forceOld" x1="208" y1="240" x2="286" y2="218"/>
    <line class="forceNew" x1="208" y1="240" x2="332" y2="185"/>
    <text class="tag" x="270" y="12">u_j</text>
    <text class="tag" x="535" y="356">u_k</text>
    <rect class="labelBox" x="456" y="132" width="168" height="42"/>
    <text class="tag" x="470" y="160">changed F_i</text>
  </g>

  <text class="small" x="100" y="655">Schematic FC3 response: two displacement degrees of freedom change one force response on atom i.</text>
</svg>
